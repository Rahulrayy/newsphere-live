<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsphere Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f9f9f7;
      --surface: #ffffff;
      --border:  #e4e4e0;
      --text:    #1a1a1a;
      --muted:   #999;
      --accent:  #4e79a7;
      --new:     #3a8a40;
      --shadow:  0 2px 8px rgba(0,0,0,0.07);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── nav ── */
    nav {
      position: fixed; top:0; left:0; right:0; height:48px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center;
      padding: 0 32px; gap: 24px; z-index: 100;
    }
    .nav-brand {
      font-family: 'DM Mono', monospace;
      font-size: 12px; letter-spacing: 0.08em;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display:flex; gap:20px; margin-left:auto; }
    .nav-links a { font-size:13px; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }
    #last-updated {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--muted);
      margin-left: 16px; padding-left: 16px;
      border-left: 0.5px solid var(--border);
    }

    /* ── loader ── */
    #loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 300;
    }
    #loader-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loader-text { font-size: 12px; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── tooltip ── */
    #tooltip {
      position: fixed; display: none;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      max-width: 280px; pointer-events: none;
      box-shadow: var(--shadow); z-index: 200;
    }
    .t-source  { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .t-title   { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
    .t-meta    { font-size: 11px; color: var(--muted); }
    .t-cluster { font-size: 11px; color: #555; margin-top: 4px; display:flex; align-items:center; gap:5px; }
    .t-cluster-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .t-new-badge {
      background: var(--new); color:#fff;
      font-size: 9px; padding: 1px 4px; border-radius: 3px;
    }

    /* ── left legend ── */
    #legend {
      position: fixed; top: 64px; left: 16px; width: 210px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px; padding: 14px;
      max-height: calc(100vh - 140px); overflow-y: auto;
      box-shadow: var(--shadow); z-index: 100;
    }
    #legend::-webkit-scrollbar { width: 3px; }
    #legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .legend-item {
      display:flex; align-items:center; gap:8px;
      padding: 6px 8px; margin: 0 -8px;
      border-radius: 6px; cursor: pointer;
      transition: background 0.15s;
    }
    .legend-item:hover  { background: var(--bg); }
    .legend-item.active { background: #eef3f8; }
    .legend-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .legend-label { font-size:11px; color:var(--text); line-height:1.3; flex:1; }
    .legend-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
    #legend-reset {
      margin-top: 10px; width: 100%;
      font-size: 11px; padding: 6px;
      border: 0.5px solid var(--border);
      border-radius: 6px; background: var(--surface);
      color: var(--muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    #legend-reset:hover { background: var(--bg); }

    /* ── article drawer ── */
    #drawer {
      position: fixed; top: 64px; left: 242px; width: 300px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px; z-index: 100;
      max-height: calc(100vh - 140px);
      display: flex; flex-direction: column;
      box-shadow: var(--shadow);
      transform: translateX(-8px); opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    #drawer.open { opacity:1; transform:translateX(0); pointer-events:all; }

    .drawer-header {
      padding: 14px 14px 10px;
      border-bottom: 0.5px solid var(--border); flex-shrink: 0;
    }
    .drawer-topic { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .drawer-dot   { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .drawer-label { font-size:13px; font-weight:500; flex:1; }
    .drawer-close {
      width:20px; height:20px; border-radius:50%;
      background: var(--bg); border: 0.5px solid var(--border);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:11px; color:var(--muted); flex-shrink:0;
      transition: background 0.15s;
    }
    .drawer-close:hover { background: var(--border); }
    .drawer-meta { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }

    .drawer-articles { overflow-y:auto; flex:1; padding:6px 0; }
    .drawer-articles::-webkit-scrollbar { width:3px; }
    .drawer-articles::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    .article-item {
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
      text-decoration: none; display:block;
      transition: background 0.12s;
    }
    .article-item:last-child { border-bottom: none; }
    .article-item:hover { background: var(--bg); }
    .article-title { font-size:12px; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:4px; }
    .article-meta  {
      font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }
    .article-new { background:var(--new); color:#fff; font-size:9px; padding:1px 4px; border-radius:3px; }
    .article-outlets { font-size:10px; color:var(--muted); margin-top:3px; }

    /* ── stats (right) ── */
    #stats {
      position: fixed; top:64px; right:16px;
      display: flex; flex-direction:column; gap:8px; z-index:100;
    }
    .stat-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 10px 14px; text-align:right;
      box-shadow: var(--shadow);
    }
    .stat-value { font-family:'DM Mono',monospace; font-size:20px; font-weight:300; }
    .stat-label { font-size:10px; color:var(--muted); margin-top:1px; }
    .stat-new .stat-value { color: var(--new); }

    /* ── timeline ── */
    #timeline {
      position: fixed; bottom:20px; left:50%; transform:translateX(-50%);
      width: min(480px, calc(100vw - 48px));
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 13px 18px;
      z-index: 100; box-shadow: var(--shadow);
    }
    .timeline-header {
      display:flex; justify-content:space-between;
      align-items:center; margin-bottom:10px;
    }
    .timeline-title {
      font-family:'DM Mono',monospace; font-size:9px; color:var(--muted);
      letter-spacing:0.1em; text-transform:uppercase;
    }
    #timeline-labels {
      font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
      display:flex; justify-content:space-between; margin-top:6px;
    }
    input[type=range] {
      width:100%; accent-color: var(--accent);
      height: 3px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loader">
  <div id="loader-spinner"></div>
  <div id="loader-text">Loading today's map…</div>
</div>

<nav>
  <a class="nav-brand" href="index.html">NEWSPHERE LIVE</a>
  <div class="nav-links">
    <a href="index.html" class="active">Map</a>
    <a href="digest.html">Digest</a>
    <a href="writeup.html">Write-up</a>
    <span id="last-updated">—</span>
  </div>
</nav>

<!-- legend -->
<div id="legend">
  <div class="panel-title">Topics</div>
  <div id="legend-items"></div>
  <button id="legend-reset">Show all</button>
</div>

<!-- article drawer -->
<div id="drawer">
  <div class="drawer-header">
    <div class="drawer-topic">
      <div class="drawer-dot" id="drawer-dot"></div>
      <div class="drawer-label" id="drawer-label">—</div>
      <div class="drawer-close" id="drawer-close">✕</div>
    </div>
    <div class="drawer-meta" id="drawer-meta"></div>
  </div>
  <div class="drawer-articles" id="drawer-articles"></div>
</div>

<!-- stats -->
<div id="stats">
  <div class="stat-card">
    <div class="stat-value" id="stat-articles">—</div>
    <div class="stat-label">unique stories</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-clusters">—</div>
    <div class="stat-label">topics</div>
  </div>
  <div class="stat-card stat-new">
    <div class="stat-value" id="stat-new">—</div>
    <div class="stat-label">new today</div>
  </div>
</div>

<!-- tooltip -->
<div id="tooltip">
  <div class="t-source"  id="tt-source"></div>
  <div class="t-title"   id="tt-title"></div>
  <div class="t-meta"    id="tt-meta"></div>
  <div class="t-cluster" id="tt-cluster"></div>
</div>

<!-- timeline -->
<div id="timeline">
  <div class="timeline-header">
    <span class="timeline-title">Timeline</span>
    <span id="timeline-current" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">All dates</span>
  </div>
  <input type="range" id="timeline-slider" min="0" max="100" value="100" />
  <div id="timeline-labels">
    <span id="tl-start">—</span>
    <span id="tl-end">—</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── palette ───────────────────────────────────────────────────────────────
const CLUSTER_COLORS = [
  '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
  '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac',
  '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
  '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf',
  '#aec7e8','#ffbb78','#98df8a','#ff9896','#c5b0d5',
];
const NOISE_COLOR = '#cccccc';
const NEW_COLOR   = '#3a8a40';

function clusterHex(id) {
  return id === -1 ? NOISE_COLOR : CLUSTER_COLORS[id % CLUSTER_COLORS.length];
}

// ── Three.js ──────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf9f9f7);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '1';

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = true;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── circle sprite texture (same as original) ──────────────────────────────
function makeCircleTexture() {
  const size = 64;
  const c    = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const half = size / 2;
  const g = ctx.createRadialGradient(half, half, 0, half, half, half);
  g.addColorStop(0.0,  'rgba(255,255,255,1)');
  g.addColorStop(0.85, 'rgba(255,255,255,1)');
  g.addColorStop(1.0,  'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(half, half, half, 0, Math.PI * 2);
  ctx.fill();
  return new THREE.CanvasTexture(c);
}

// ── data ──────────────────────────────────────────────────────────────────
let allPoints     = [];
let newsData      = {};
let clusterLabels = {};
let newUrls       = new Set();
let activeCluster = null;
let dateList      = [];

const raycaster   = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.15;
const mouse       = new THREE.Vector2();
let mouseDownPos  = { x:0, y:0 };

// ── build point cloud ─────────────────────────────────────────────────────
function buildPointCloud(points) {
  if (window.pointCloud) scene.remove(window.pointCloud);

  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(points.length * 3);
  const col = new Float32Array(points.length * 3);

  points.forEach((p, i) => {
    pos[i*3]   = p.x;
    pos[i*3+1] = p.y;
    pos[i*3+2] = p.z;
    const isNew = newUrls.has(p.url);
    const c = new THREE.Color(isNew ? NEW_COLOR : clusterHex(p.cluster));
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
  });

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({
    size:            0.28,
    vertexColors:    true,
    sizeAttenuation: true,
    map:             makeCircleTexture(),
    transparent:     true,
    alphaTest:       0.05,
    depthWrite:      false,
  });

  window.pointCloud = new THREE.Points(geo, mat);
  scene.add(window.pointCloud);
}

function centerCamera() {
  const box    = new THREE.Box3().setFromObject(window.pointCloud);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const dist   = Math.max(size.x, size.y, size.z) * 1.5;
  camera.position.set(center.x, center.y, center.z + dist);
  camera.lookAt(center);
  controls.target.copy(center);
  controls.update();
  window.sceneCenter = center;
}

// ── color update (highlight / timeline filter) ────────────────────────────
function applyFilters(cutoffDate, clusterId) {
  if (!window.pointCloud) return;
  const colors = window.pointCloud.geometry.attributes.color;
  allPoints.forEach((p, i) => {
    const inDate    = !cutoffDate || !p.date || p.date <= cutoffDate;
    const inCluster = clusterId === null || p.cluster === clusterId;
    if (inDate && inCluster) {
      const isNew = newUrls.has(p.url);
      const c = new THREE.Color(isNew ? NEW_COLOR : clusterHex(p.cluster));
      colors.setXYZ(i, c.r, c.g, c.b);
    } else {
      colors.setXYZ(i, 0.87, 0.87, 0.85);
    }
  });
  colors.needsUpdate = true;
}

// ── legend ────────────────────────────────────────────────────────────────
function buildLegend() {
  const counts = {};
  allPoints.forEach(p => { if (p.cluster !== -1) counts[p.cluster] = (counts[p.cluster]||0)+1; });
  const sorted = Object.entries(clusterLabels)
    .filter(([id]) => parseInt(id) !== -1)
    .sort((a,b) => (counts[b[0]]||0) - (counts[a[0]]||0));

  const container = document.getElementById('legend-items');
  container.innerHTML = '';

  sorted.forEach(([id, label]) => {
    const color = clusterHex(parseInt(id));
    const item  = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cid = id;
    item.innerHTML = `
      <div class="legend-dot" style="background:${color}"></div>
      <div class="legend-label">${label}</div>
      <div class="legend-count">${counts[id]||0}</div>`;
    item.addEventListener('click', () => {
      highlightCluster(parseInt(id), item);
      openDrawer(parseInt(id));
    });
    container.appendChild(item);
  });

  document.getElementById('legend-reset').addEventListener('click', () => {
    resetHighlight();
    closeDrawer();
  });
}

// ── highlight ─────────────────────────────────────────────────────────────
function highlightCluster(cid, itemEl) {
  if (activeCluster === cid) { resetHighlight(); closeDrawer(); return; }
  activeCluster = cid;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  itemEl.classList.add('active');
  const cutoff = getCurrentCutoff();
  applyFilters(cutoff, activeCluster);
}

function resetHighlight() {
  activeCluster = null;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  applyFilters(getCurrentCutoff(), null);
}

function getCurrentCutoff() {
  const slider = document.getElementById('timeline-slider');
  const idx    = parseInt(slider.value);
  return dateList.length > 0 ? dateList[idx] : null;
}

// ── drawer ────────────────────────────────────────────────────────────────
function openDrawer(cid) {
  const color  = clusterHex(cid);
  const label  = clusterLabels[cid] || 'unlabelled';
  const pts    = allPoints.filter(p => p.cluster === cid)
                          .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const outlets = new Set();
  pts.forEach(a => { outlets.add(a.source); (a.also_covered_by||[]).forEach(s => outlets.add(s)); });

  document.getElementById('drawer-dot').style.background   = color;
  document.getElementById('drawer-label').textContent      = label;
  document.getElementById('drawer-meta').textContent       = `${pts.length} stories · ${outlets.size} outlets`;

  const container = document.getElementById('drawer-articles');
  container.innerHTML = '';

  pts.forEach(a => {
    const isNew = newUrls.has(a.url);
    const also  = (a.also_covered_by||[]).length > 0
      ? `<div class="article-outlets">Also: ${a.also_covered_by.join(', ')}</div>` : '';
    const el = document.createElement('a');
    el.className = 'article-item';
    el.href      = a.url || '#';
    el.target    = '_blank';
    el.rel       = 'noopener';
    el.innerHTML = `
      <div class="article-title">${a.title}</div>
      <div class="article-meta">
        <span>${a.source}</span>
        <span>${a.date||''}</span>
        ${isNew ? '<span class="article-new">NEW</span>' : ''}
      </div>${also}`;
    container.appendChild(el);
  });

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

document.getElementById('drawer-close').addEventListener('click', () => {
  closeDrawer();
  resetHighlight();
});

// ── timeline ──────────────────────────────────────────────────────────────
function setupTimeline() {
  dateList = [...new Set(allPoints.map(p => p.date).filter(Boolean))].sort();
  if (dateList.length < 2) return;

  document.getElementById('tl-start').textContent = dateList[0];
  document.getElementById('tl-end').textContent   = dateList[dateList.length - 1];

  const slider = document.getElementById('timeline-slider');
  slider.min   = 0;
  slider.max   = dateList.length - 1;
  slider.value = dateList.length - 1;

  slider.addEventListener('input', () => {
    const cutoff = dateList[parseInt(slider.value)];
    document.getElementById('timeline-current').textContent = cutoff;
    applyFilters(cutoff, activeCluster);
  });
}

// ── tooltip ───────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  if (!window.pointCloud) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(window.pointCloud);

  if (hits.length > 0) {
    const p      = allPoints[hits[0].index];
    const isNew  = newUrls.has(p.url);
    const color  = clusterHex(p.cluster);
    const label  = p.cluster === -1 ? 'noise' : (clusterLabels[p.cluster] || '');
    const outlets= (p.also_covered_by||[]).length > 0
      ? `Also: ${p.also_covered_by.join(', ')}` : '';

    document.getElementById('tt-source').innerHTML =
      `${p.source}${isNew ? ' <span class="t-new-badge">NEW</span>' : ''}`;
    document.getElementById('tt-title').textContent   = p.title;
    document.getElementById('tt-meta').textContent    = `${p.date||''} — ${p.source}`;
    document.getElementById('tt-cluster').innerHTML   =
      `<div class="t-cluster-dot" style="background:${color}"></div>${label}`;

    tooltip.style.display = 'block';
    let tx = e.clientX + 14, ty = e.clientY - 10;
    if (tx + 290 > window.innerWidth)  tx = e.clientX - 300;
    if (ty + 120 > window.innerHeight) ty = e.clientY - 130;
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

// ── click: open cluster from point ───────────────────────────────────────
renderer.domElement.addEventListener('mousedown', e => { mouseDownPos = {x:e.clientX, y:e.clientY}; });
renderer.domElement.addEventListener('mouseup', e => {
  if (Math.abs(e.clientX - mouseDownPos.x) > 4 || Math.abs(e.clientY - mouseDownPos.y) > 4) return;

  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (!window.pointCloud) return;
  const hits = raycaster.intersectObject(window.pointCloud);
  if (hits.length > 0) {
    const p = allPoints[hits[0].index];
    if (p.cluster === -1) return;
    const itemEl = document.querySelector(`.legend-item[data-cid="${p.cluster}"]`);
    if (itemEl) highlightCluster(p.cluster, itemEl);
    openDrawer(p.cluster);
  }
});

// ── animate ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── load data ─────────────────────────────────────────────────────────────
async function loadData() {
  const [mapRes, diffRes] = await Promise.allSettled([
    fetch('data/news_map.json'),
    fetch('data/news_map_diff.json'),
  ]);

  if (mapRes.status !== 'fulfilled' || !mapRes.value.ok) {
    document.getElementById('loader-text').textContent = 'Could not load map data.';
    return;
  }

  const data = await mapRes.value.json();

  if (diffRes.status === 'fulfilled' && diffRes.value.ok) {
    const diff = await diffRes.value.json();
    newUrls = new Set((diff.new_points || []).map(p => p.url).filter(Boolean));
    document.getElementById('stat-new').textContent = diff.n_new ?? '—';
  }

  allPoints     = data.points || [];
  clusterLabels = data.clusters || {};
  newsData      = data;

  document.getElementById('stat-articles').textContent = data.n_articles ?? allPoints.length;
  document.getElementById('stat-clusters').textContent = data.n_clusters ?? '—';
  document.getElementById('last-updated').textContent  = data.generated_at ?? '';

  buildPointCloud(allPoints);
  centerCamera();
  buildLegend();
  setupTimeline();

  document.getElementById('loader').style.display = 'none';
}

loadData().catch(err => {
  console.error(err);
  document.getElementById('loader-text').textContent = 'Error loading data.';
});
</script>
