<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsphere Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080b0f;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --text:      #e8eaf0;
      --muted:     rgba(232,234,240,0.4);
      --accent:    #4e79a7;
      --new:       #59a14f;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── canvas ── */
    #canvas { display: block; width: 100vw; height: 100vh; }

    /* ── nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(8,11,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
      z-index: 100;
    }

    .nav-brand {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      margin-left: auto;
      align-items: center;
    }

    .nav-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    #last-updated {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-left: 16px;
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }

    /* ── left panel: cluster legend ── */
    #legend {
      position: fixed;
      top: 64px;
      left: 20px;
      width: 200px;
      background: rgba(8,11,15,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      z-index: 50;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }

    #legend::-webkit-scrollbar { width: 3px; }
    #legend::-webkit-scrollbar-track { background: transparent; }
    #legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .legend-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.2s;
    }

    .legend-item:hover { opacity: 0.7; }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 11px;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }

    .legend-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ── bottom: timeline slider ── */
    #timeline {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(500px, calc(100vw - 48px));
      background: rgba(8,11,15,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      z-index: 50;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .timeline-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #timeline-labels {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(78,121,167,0.6);
    }

    /* ── stats bar ── */
    #stats {
      position: fixed;
      top: 64px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
    }

    .stat-card {
      background: rgba(8,11,15,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      text-align: right;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 300;
      color: var(--text);
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    .stat-new .stat-value { color: var(--new); }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      max-width: 280px;
      background: rgba(8,11,15,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #tooltip.visible { opacity: 1; }

    .tt-source {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tt-new-badge {
      background: var(--new);
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .tt-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .tt-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .tt-outlets {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.4;
    }

    .tt-cluster {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tt-cluster-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tt-hint {
      font-size: 9px;
      color: rgba(232,234,240,0.2);
      margin-top: 8px;
      letter-spacing: 0.03em;
    }

    /* ── loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }

    .loading-title {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    .loading-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      animation: loadpulse 1.2s ease-in-out infinite;
    }

    @keyframes loadpulse {
      0%   { width: 0%; margin-left: 0%; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>

<!-- loading screen -->
<div id="loading">
  <div class="loading-title">NEWSPHERE LIVE</div>
  <div class="loading-sub">Loading today's map…</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- nav -->
<nav>
  <a class="nav-brand" href="index.html">NEWSPHERE LIVE</a>
  <div class="nav-links">
    <a href="index.html" class="active">Map</a>
    <a href="digest.html">Digest</a>
    <a href="writeup.html">Write-up</a>
    <span id="last-updated">—</span>
  </div>
</nav>

<!-- cluster legend -->
<div id="legend">
  <div class="legend-title">Topics</div>
  <div id="legend-items"></div>
</div>

<!-- stats -->
<div id="stats">
  <div class="stat-card">
    <div class="stat-value" id="stat-articles">—</div>
    <div class="stat-label">unique stories</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-clusters">—</div>
    <div class="stat-label">topics</div>
  </div>
  <div class="stat-card stat-new">
    <div class="stat-value" id="stat-new">—</div>
    <div class="stat-label">new today</div>
  </div>
</div>

<!-- 3d canvas -->
<canvas id="canvas"></canvas>

<!-- tooltip -->
<div id="tooltip">
  <div class="tt-source" id="tt-source"></div>
  <div class="tt-title"  id="tt-title"></div>
  <div class="tt-date"   id="tt-date"></div>
  <div class="tt-outlets" id="tt-outlets"></div>
  <div class="tt-cluster" id="tt-cluster"></div>
  <div class="tt-hint">click to open article</div>
</div>

<!-- timeline -->
<div id="timeline">
  <div class="timeline-header">
    <span class="timeline-title">Timeline</span>
    <span id="timeline-current" style="font-family:var(--mono);font-size:10px;color:var(--muted);">All dates</span>
  </div>
  <input type="range" id="timeline-slider" min="0" max="100" value="100" />
  <div id="timeline-labels">
    <span id="tl-start">—</span>
    <span id="tl-end">—</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── palette (matches digest.html) ──────────────────────────────────────────
const COLORS = [
  0x4e79a7, 0xf28e2b, 0xe15759, 0x76b7b2, 0x59a14f,
  0xedc948, 0xb07aa1, 0xff9da7, 0x9c755f, 0xbab0ac,
  0x1f77b4, 0xff7f0e, 0x2ca02c, 0xd62728, 0x9467bd,
  0x8c564b, 0xe377c2, 0x7f7f7f, 0xbcbd22, 0x17becf,
  0xaec7e8, 0xffbb78, 0x98df8a, 0xff9896, 0xc5b0d5,
];
const NOISE_COLOR  = 0x334455;
const NEW_COLOR    = 0x59a14f;

function clusterColor(id) {
  if (id === -1) return NOISE_COLOR;
  return COLORS[id % COLORS.length];
}

function hexStr(hex) {
  return '#' + hex.toString(16).padStart(6, '0');
}

// ── Three.js setup ──────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x080b0f, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0, 18);

// subtle ambient fog for depth
scene.fog = new THREE.FogExp2(0x080b0f, 0.018);

// starfield background
(function addStars() {
  const geo = new THREE.BufferGeometry();
  const n   = 2000;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) pos[i] = (Math.random() - 0.5) * 300;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.25 });
  scene.add(new THREE.Points(geo, mat));
})();

// ── orbit controls (manual, no external dep) ───────────────────────────────
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical  = { theta: 0, phi: Math.PI / 2, r: 18 };
let targetSph  = { theta: 0, phi: Math.PI / 2, r: 18 };
let autoRotate = true;

canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup',   () => { isDragging = false; });
canvas.addEventListener('mouseleave',() => { isDragging = false; });

canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    targetSph.theta -= dx * 0.005;
    targetSph.phi    = Math.max(0.1, Math.min(Math.PI - 0.1, targetSph.phi + dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
  }
  handleHover(e);
});

canvas.addEventListener('wheel', e => {
  targetSph.r = Math.max(4, Math.min(50, targetSph.r + e.deltaY * 0.02));
}, { passive: true });

canvas.addEventListener('click', handleClick);

// touch support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  autoRotate = false;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  isDragging = true;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!touchStart) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  targetSph.theta -= dx * 0.005;
  targetSph.phi    = Math.max(0.1, Math.min(Math.PI - 0.1, targetSph.phi + dy * 0.005));
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; touchStart = null; });

// ── data & points ──────────────────────────────────────────────────────────
let allPoints    = [];
let visibleMask  = [];   // bool per point: currently rendered?
let newUrls      = new Set();
let clusterLabels = {};

let pointsGeo, pointsMat, pointsMesh;
let highlightGeo, highlightMat, highlightMesh;  // for new articles

// raycasting
const raycaster  = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.15;
const mouse      = new THREE.Vector2(-9999, -9999);
let hoveredIdx   = -1;

function buildScene(points) {
  if (pointsMesh)     scene.remove(pointsMesh);
  if (highlightMesh)  scene.remove(highlightMesh);

  const n     = points.length;
  const pos   = new Float32Array(n * 3);
  const col   = new Float32Array(n * 3);
  const sizes = new Float32Array(n);

  const newPos = [];
  const newCol = [];

  const tmp = new THREE.Color();

  points.forEach((p, i) => {
    pos[i * 3]     = p.x;
    pos[i * 3 + 1] = p.y;
    pos[i * 3 + 2] = p.z;

    const isNew = newUrls.has(p.url);
    const hex   = isNew ? NEW_COLOR : clusterColor(p.cluster);
    tmp.setHex(hex);
    col[i * 3]     = tmp.r;
    col[i * 3 + 1] = tmp.g;
    col[i * 3 + 2] = tmp.b;
    sizes[i]       = isNew ? 0.5 : (p.cluster === -1 ? 0.18 : 0.32);

    if (isNew) {
      newPos.push(p.x, p.y, p.z);
      newCol.push(tmp.r, tmp.g, tmp.b);
    }
  });

  pointsGeo = new THREE.BufferGeometry();
  pointsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  pointsGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  pointsGeo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  pointsMat = new THREE.ShaderMaterial({
    vertexColors:  true,
    transparent:   true,
    depthWrite:    false,
    uniforms: { opacity: { value: 1.0 } },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      varying float vSize;
      void main() {
        vColor = color;
        vSize  = size;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mv.z);
        gl_Position  = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vSize;
      uniform float opacity;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float alpha = smoothstep(1.0, 0.3, d) * opacity;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
  });

  pointsMesh = new THREE.Points(pointsGeo, pointsMat);
  scene.add(pointsMesh);

  // glow ring for new articles
  if (newPos.length > 0) {
    highlightGeo = new THREE.BufferGeometry();
    highlightGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(newPos), 3));
    highlightGeo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(newCol), 3));
    highlightMat = new THREE.ShaderMaterial({
      vertexColors: true,
      transparent:  true,
      depthWrite:   false,
      uniforms: { time: { value: 0 } },
      vertexShader: `
        varying vec3 vColor;
        uniform float time;
        void main() {
          vColor = color;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = (0.5 + 0.3 * sin(time * 2.0)) * (300.0 / -mv.z);
          gl_Position  = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        uniform float time;
        void main() {
          float d = length(gl_PointCoord - 0.5) * 2.0;
          if (d > 1.0) discard;
          float alpha = smoothstep(1.0, 0.4, d) * 0.35;
          gl_FragColor = vec4(vColor, alpha);
        }
      `,
    });
    highlightMesh = new THREE.Points(highlightGeo, highlightMat);
    scene.add(highlightMesh);
  }
}

// ── legend ─────────────────────────────────────────────────────────────────
function buildLegend(data) {
  const counts = {};
  data.points.forEach(p => {
    if (p.cluster !== -1) counts[p.cluster] = (counts[p.cluster] || 0) + 1;
  });

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const container = document.getElementById('legend-items');
  container.innerHTML = '';

  sorted.forEach(([cid, count]) => {
    const label = clusterLabels[cid] || 'unlabelled';
    const color = hexStr(clusterColor(parseInt(cid)));
    const item  = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-dot" style="background:${color}"></div>
      <div class="legend-label">${label}</div>
      <div class="legend-count">${count}</div>
    `;
    container.appendChild(item);
  });
}

// ── timeline ───────────────────────────────────────────────────────────────
function setupTimeline() {
  const dates = [...new Set(allPoints.map(p => p.date).filter(Boolean))].sort();
  if (dates.length < 2) return;

  document.getElementById('tl-start').textContent = dates[0];
  document.getElementById('tl-end').textContent   = dates[dates.length - 1];

  const slider = document.getElementById('timeline-slider');
  slider.min   = 0;
  slider.max   = dates.length - 1;
  slider.value = dates.length - 1;

  slider.addEventListener('input', () => {
    const cutoff = dates[parseInt(slider.value)];
    document.getElementById('timeline-current').textContent = cutoff;
    filterByDate(cutoff);
  });
}

function filterByDate(cutoff) {
  if (!pointsGeo) return;
  const sizes = pointsGeo.attributes.size.array;
  allPoints.forEach((p, i) => {
    const show = !p.date || p.date <= cutoff;
    sizes[i] = show ? (newUrls.has(p.url) ? 0.5 : (p.cluster === -1 ? 0.18 : 0.32)) : 0;
  });
  pointsGeo.attributes.size.needsUpdate = true;
}

// ── hover & tooltip ────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function handleHover(e) {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  if (!pointsMesh) return;

  const hits = raycaster.intersectObject(pointsMesh);
  if (hits.length > 0) {
    const idx = hits[0].index;
    if (idx !== hoveredIdx) {
      hoveredIdx = idx;
      showTooltip(e, allPoints[idx]);
    }
    canvas.style.cursor = 'pointer';
    positionTooltip(e);
  } else {
    hoveredIdx = -1;
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
}

function showTooltip(e, p) {
  const isNew   = newUrls.has(p.url);
  const color   = hexStr(clusterColor(p.cluster));
  const label   = p.cluster === -1 ? 'noise' : (clusterLabels[p.cluster] || '');
  const outlets = p.also_covered_by && p.also_covered_by.length > 0
    ? `Also: ${p.also_covered_by.join(', ')}`
    : '';

  document.getElementById('tt-source').innerHTML =
    `${p.source}${isNew ? ' <span class="tt-new-badge">NEW</span>' : ''}`;
  document.getElementById('tt-title').textContent   = p.title;
  document.getElementById('tt-date').textContent    = p.date || '';
  document.getElementById('tt-outlets').textContent = outlets;
  document.getElementById('tt-cluster').innerHTML   =
    `<div class="tt-cluster-dot" style="background:${color}"></div>${label}`;

  tooltip.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const pad = 14;
  const tw  = tooltip.offsetWidth  || 280;
  const th  = tooltip.offsetHeight || 120;
  let   tx  = e.clientX + pad;
  let   ty  = e.clientY + pad;
  if (tx + tw > window.innerWidth)  tx = e.clientX - tw - pad;
  if (ty + th > window.innerHeight) ty = e.clientY - th - pad;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
}

function handleClick() {
  if (hoveredIdx >= 0) {
    const url = allPoints[hoveredIdx].url;
    if (url) window.open(url, '_blank');
  }
}

// ── resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── animation loop ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRotate) targetSph.theta += 0.0008;

  // smooth lerp
  spherical.theta += (targetSph.theta - spherical.theta) * 0.06;
  spherical.phi   += (targetSph.phi   - spherical.phi)   * 0.06;
  spherical.r     += (targetSph.r     - spherical.r)     * 0.06;

  camera.position.x = spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.r * Math.cos(spherical.phi);
  camera.position.z = spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);

  if (highlightMesh) highlightMesh.material.uniforms.time.value = t;

  renderer.render(scene, camera);
}

animate();

// ── load data ──────────────────────────────────────────────────────────────
async function loadData() {
  const [mapResp, diffResp] = await Promise.allSettled([
    fetch('data/news_map.json'),
    fetch('data/news_map_diff.json'),
  ]);

  if (mapResp.status !== 'fulfilled' || !mapResp.value.ok) {
    document.querySelector('.loading-sub').textContent = 'Could not load map data.';
    return;
  }

  const data = await mapResp.value.json();

  // diff (optional)
  if (diffResp.status === 'fulfilled' && diffResp.value.ok) {
    const diff = await diffResp.value.json();
    newUrls = new Set((diff.new_points || []).map(p => p.url).filter(Boolean));
    document.getElementById('stat-new').textContent = diff.n_new ?? '—';
  }

  allPoints     = data.points || [];
  clusterLabels = data.clusters || {};

  // stats
  document.getElementById('stat-articles').textContent = data.n_articles ?? allPoints.length;
  document.getElementById('stat-clusters').textContent = data.n_clusters ?? '—';
  document.getElementById('last-updated').textContent  = data.generated_at ?? '';

  buildScene(allPoints);
  buildLegend(data);
  setupTimeline();

  // hide loading
  document.getElementById('loading').style.display = 'none';
}

loadData().catch(err => {
  console.error(err);
  document.querySelector('.loading-sub').textContent = 'Error loading data.';
});
</script>
