name: News map rebuild

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-minilm

      - name: Install dependencies
        run: uv pip install --system -r pipeline/requirements.txt

      - name: Fetch articles from RSS feeds
        run: python pipeline/fetch_articles.py

      - name: Embed article text
        run: python pipeline/embed.py

      - name: Cluster, align, and export
        run: python pipeline/cluster.py

      - name: Compute diff
        run: python pipeline/diff.py

      - name: Validate output
        run: python pipeline/validate.py

      - name: Generate digest and send emails
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python pipeline/digest.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ digest.html
          git diff --cached --quiet || git commit -m "chore: rebuild $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify on failure
        if: failure()
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL:   ${{ secrets.ALERT_EMAIL }}
        run: |
          python -c "
          import os, requests
          requests.post('https://api.brevo.com/v3/smtp/email', headers={
              'api-key': os.environ['BREVO_API_KEY'],
              'Content-Type': 'application/json',
          }, json={
              'sender': {'name': 'Newsphere Live', 'email': 'rahulrayy05@gmail.com'},
              'to': [{'email': os.environ['ALERT_EMAIL']}],
              'subject': 'Newsphere Live pipeline failed',
              'htmlContent': '<p>Pipeline failed. Check the Actions tab.</p>',
          })
          "